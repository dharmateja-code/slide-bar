<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glassmorphism Sidebar</title>
  <link rel="stylesheet" href="st.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="glass-sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">P</div>
        <div>
          <p class="brand-title">PUNCH</p>
          <p class="brand-subtitle">Control Panel</p>
        </div>
      </div>

      <nav class="sidebar-menu">
        <a class="menu-item active" href="#">Dashboard</a>

        <details class="menu-group" open>
          <summary class="group-title">Create</summary>
          <a class="sub-item" href="#">Article</a>
          <a class="sub-item" href="#">Document</a>
          <a class="sub-item" href="#">Slides</a>
        </details>

        <details class="menu-group">
          <summary class="group-title">Account</summary>
          <a class="sub-item" href="#">Admin</a>
          <a class="sub-item" href="#">Display</a>
          <a class="sub-item" href="#">Appearance</a>
          <a class="sub-item" href="#">Preference</a>
        </details>

        <details class="menu-group">
          <summary class="group-title">Profile</summary>
          <a class="sub-item" href="#">Avatar</a>
          <a class="sub-item" href="#">Theme</a>
        </details>

        <a class="menu-item" href="#">Notifications</a>
        <a class="menu-item" href="#">Favourites</a>
        <a class="menu-item" href="#">Products</a>
        <a class="menu-item" href="#">Settings</a>
      </nav>
    </aside>

    <main class="main-content">
      <section class="hero-panel">
        <h1>Modern Glassmorphism Sidebar</h1>
        <p>Use this layout for dashboard navigation with nested menu groups.</p>
      </section>
    </main>
  </div>
</body>
</html>
